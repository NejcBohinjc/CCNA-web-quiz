<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetQuiz — CCNA1 Practice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <header class="site-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-hidden="true">
        <rect x="1" y="10" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <rect x="19" y="10" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <rect x="10" y="1" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <rect x="10" y="19" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <line x1="9" y1="14" x2="19" y2="14" stroke="currentColor" stroke-width="1.5"/>
        <line x1="14" y1="9" x2="14" y2="19" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span>NetQuiz</span>
    </div>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle light/dark mode">
      <span class="icon-sun">☀</span>
      <span class="icon-moon">☽</span>
    </button>
  </header>

  <!-- ── START SCREEN ── -->
  <main id="screen-start" class="screen active">
    <div class="card start-card">
      <div class="start-badge">CCNA 1 v7.0 · ITN</div>
      <h1>Introduction to Networks</h1>
      <p class="subtitle">111 practice questions. Choose how many you want to tackle.</p>

      <div class="count-control">
        <label for="q-count">Number of questions</label>
        <div class="count-row">
          <input type="range" id="q-slider" min="1" max="111" value="10" />
          <input type="number" id="q-count" min="1" max="111" value="10" />
        </div>
      </div>

      <div class="quick-picks">
        <button class="pick-btn" data-n="10">10</button>
        <button class="pick-btn" data-n="25">25</button>
        <button class="pick-btn" data-n="50">50</button>
        <button class="pick-btn" data-n="111">All</button>
      </div>

      <button id="start-btn" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><polygon points="4,2 14,8 4,14"/></svg>
        Start Quiz
      </button>
    </div>
  </main>

  <!-- ── QUIZ SCREEN ── -->
  <main id="screen-quiz" class="screen">
    <button id="exit-btn" class="exit-btn" title="Exit quiz">✕ Exit</button>

    <div class="quiz-topbar">
      <span id="q-counter" class="q-counter">1 / 10</span>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <span id="q-score-live" class="score-live">✓ 0</span>
      <span id="q-wrong-live" class="wrong-live">✗ 0</span>
    </div>

    <div class="card quiz-card">
      <p id="multi-hint" class="multi-hint hidden">Select all correct answers</p>
      <h2 id="q-text" class="q-text"></h2>
      <div id="options-wrap" class="options-wrap"></div>
      <button id="next-btn" class="btn-primary" disabled>Confirm →</button>
    </div>
  </main>

  <!-- ── RESULTS SCREEN ── -->
  <main id="screen-results" class="screen">
    <div class="card results-card">
      <h2>Quiz Complete</h2>
      <div class="score-ring-wrap">
        <svg class="score-ring" viewBox="0 0 120 120">
          <circle class="ring-track" cx="60" cy="60" r="52" />
          <circle id="ring-fill" class="ring-fill" cx="60" cy="60" r="52" />
        </svg>
        <div class="score-inner">
          <span id="res-pct">0%</span>
          <small id="res-fraction">0 / 0</small>
        </div>
      </div>
      <p id="res-message" class="res-message"></p>

      <div id="wrong-list" class="wrong-list"></div>

      <div class="results-actions">
        <button id="retry-btn" class="btn-primary">Retry Same</button>
        <button id="new-btn" class="btn-secondary">New Quiz</button>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
